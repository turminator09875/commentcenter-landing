<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background — light canvas matching DNA v3 -->
  <rect width="1200" height="630" fill="#FFFFFF"/>

  <!-- Subtle warm tint top-right -->
  <radialGradient id="g1" cx="85%" cy="10%" r="55%">
    <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#g1)"/>

  <!-- Logo icon -->
  <g transform="translate(120, 80)">
    <rect x="0" y="0" width="44" height="32" rx="8" fill="#3b82f6"/>
    <polygon points="8,32 15,42 20,32" fill="#3b82f6"/>
    <rect x="8" y="8" width="28" height="3.5" rx="1.75" fill="white" opacity="0.35"/>
    <rect x="8" y="16" width="20" height="5" rx="2.5" fill="white"/>
    <rect x="8" y="25" width="24" height="3.5" rx="1.75" fill="white" opacity="0.35"/>
  </g>

  <!-- Wordmark next to logo -->
  <text x="176" y="108" font-family="-apple-system,BlinkMacSystemFont,'DM Sans','Segoe UI',sans-serif" font-size="26" font-weight="700" fill="#141414" letter-spacing="-0.5">Comment<tspan fill="#3b82f6">Center</tspan></text>

  <!-- Main headline -->
  <text x="120" y="260" font-family="-apple-system,BlinkMacSystemFont,'DM Sans','Segoe UI',sans-serif" font-size="72" font-weight="700" fill="#141414" letter-spacing="-2">Je beste leads zitten</text>
  <text x="120" y="352" font-family="-apple-system,BlinkMacSystemFont,'DM Sans','Segoe UI',sans-serif" font-size="72" font-weight="700" fill="#141414" letter-spacing="-2">in je <tspan fill="#3b82f6">comments</tspan>.</text>

  <!-- Sub -->
  <text x="120" y="416" font-family="-apple-system,BlinkMacSystemFont,'DM Sans','Segoe UI',sans-serif" font-size="26" fill="#737373" letter-spacing="-0.3">AI scheidt kopers van ruis. Jij reageert alleen op de kopers.</text>

  <!-- Classification chips — bottom left -->
  <g transform="translate(120, 490)">
    <rect x="0" y="0" width="114" height="38" rx="8" fill="#05966918"/>
    <text x="57" y="24" font-family="-apple-system,BlinkMacSystemFont,'DM Sans','Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#059669" text-anchor="middle" letter-spacing="0.8">HOT LEAD</text>

    <rect x="126" y="0" width="112" height="38" rx="8" fill="#D9770618"/>
    <text x="182" y="24" font-family="-apple-system,BlinkMacSystemFont,'DM Sans','Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#D97706" text-anchor="middle" letter-spacing="0.8">INTERESSE</text>

    <rect x="250" y="0" width="88" height="38" rx="8" fill="#3b82f618"/>
    <text x="294" y="24" font-family="-apple-system,BlinkMacSystemFont,'DM Sans','Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#3b82f6" text-anchor="middle" letter-spacing="0.8">VRAAG</text>

    <rect x="350" y="0" width="96" height="38" rx="8" fill="#DC262618"/>
    <text x="398" y="24" font-family="-apple-system,BlinkMacSystemFont,'DM Sans','Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#DC2626" text-anchor="middle" letter-spacing="0.8">KLACHT</text>

    <rect x="458" y="0" width="78" height="38" rx="8" fill="#A3A3A318"/>
    <text x="497" y="24" font-family="-apple-system,BlinkMacSystemFont,'DM Sans','Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#A3A3A3" text-anchor="middle" letter-spacing="0.8">SPAM</text>
  </g>

  <!-- URL bottom right -->
  <text x="1080" y="560" font-family="-apple-system,BlinkMacSystemFont,'DM Sans','Segoe UI',sans-serif" font-size="18" fill="#A3A3A3" text-anchor="end" letter-spacing="-0.2">commentcenter.nl</text>
</svg>
